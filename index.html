<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>STAR PRESTASI K8.9 - DIGITAL COUNSELING</title>
    <script>
        // Suppress benign Vite WebSocket errors that occur when HMR is disabled
        (function () {
            const originalError = console.error;
            const originalWarn = console.warn;
            const suppressPatterns = [
                'WebSocket closed without being opened',
                'failed to connect to websocket',
                '[vite] connect format error'
            ];

            const shouldSuppress = (args) => {
                const msg = args.map(arg => String(arg)).join(' ');
                return suppressPatterns.some(pattern => msg.includes(pattern));
            };

            console.error = function (...args) {
                if (shouldSuppress(args)) return;
                originalError.apply(console, args);
            };

            console.warn = function (...args) {
                if (shouldSuppress(args)) return;
                originalWarn.apply(console, args);
            };
        })();
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/index.css">
</head>

<body class="text-slate-900 selection:bg-indigo-100 selection:text-indigo-900">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>

</html>
